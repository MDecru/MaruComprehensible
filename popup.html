<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* ── CSS variables (dark theme default) ── */
  :root {
    --bg:      #232425;
    --surface: #2D3031;
    --deep:    #1C1E1F;
    --border:  #363A3B;
    --text:    #f2f4fa;
    --body:    #d8dcea;
    --muted:   #a8b2cc;
    --dim:     #8890aa;
    --ph:      #4a5068;
    --ring-bg: #363A3B;
    --score-empty: #3a3f55;
  }
  body.light-theme {
    --bg:      #ffffff;
    --surface: #f0f2f5;
    --deep:    #e2e8f0;
    --border:  #66AAE8;
    --text:    #2c2f33;
    --body:    #3a3f47;
    --muted:   #4a5570;
    --dim:     #66748a;
    --ph:      #aab4c4;
    --ring-bg: #c8dff6;
    --score-empty: #aab4c4;
  }

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    width: 280px;
    background: var(--bg);
    color: var(--body);
  }

  /* ── Tabs ── */
  .tabs { display:flex; background:var(--deep); border-bottom:1px solid var(--border); }
  .tab-btn {
    flex:1; padding:11px 0; background:none; border:none;
    font-size:12px; font-weight:700; color:var(--dim); cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-1px;
    transition:color .15s; letter-spacing:.4px; text-transform:uppercase;
  }
  .tab-btn.active   { color:#72CE9D; border-bottom-color:#72CE9D; }
  .tab-btn:hover:not(.active) { color:var(--muted); }

  .tab-panel { display:none; padding:16px; }
  .tab-panel.active { display:block; }

  /* ── Typography ── */
  h2 { font-size:14px; font-weight:700; color:var(--text); margin-bottom:14px; letter-spacing:.3px; }
  .sec-label {
    font-size:10px; font-weight:700; color:var(--dim);
    text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px;
  }

  /* ── Input ── */
  input[type="text"] {
    width:100%; padding:9px 12px; margin-bottom:10px;
    border-radius:10px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:13px;
    outline:none; transition:border-color .15s;
  }
  input[type="text"]:focus   { border-color:#72CE9D; }
  input[type="text"]::placeholder { color:var(--ph); }

  /* ── Buttons ── */
  .btn {
    width:100%; padding:9px 14px; border-radius:12px;
    border:1px solid transparent; cursor:pointer;
    font-size:13px; font-weight:700; margin-bottom:8px;
    transition:filter .15s, opacity .15s;
    display:flex; align-items:center; justify-content:center; gap:7px;
    letter-spacing:.2px;
  }
  .btn:last-child  { margin-bottom:0; }
  .btn:disabled    { opacity:.35; cursor:default; }
  .btn:not(:disabled):hover { filter:brightness(1.12); }

  .btn-green  { background:#72CE9D; color:#fff; border-color:#72CE9D; }
  .btn-amber  { background:#FDC281; color:#fff; border-color:#FDC281; }
  .btn-blue   { background:#66AAE8; color:#fff; border-color:#66AAE8; }
  .btn-pink   { background:#ED7989; color:#fff; border-color:#ED7989; }
  .btn-slate  { background:var(--surface); color:var(--muted); border-color:var(--border); }
  .btn-purple { background:#7E69F0; color:#fff; border-color:#7E69F0; }
  .btn:not(:disabled):hover { filter:brightness(.9); }

  label.btn { cursor:pointer; }

  /* ── Theme toggle ── */
  .theme-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .theme-row span { font-size:12px; color:var(--muted); }
  .theme-switch { position:relative; width:40px; height:22px; flex-shrink:0; }
  .theme-switch input { opacity:0; width:0; height:0; }
  .theme-track {
    position:absolute; inset:0; border-radius:11px; cursor:pointer;
    background:var(--surface); border:1px solid var(--border); transition:background .2s;
  }
  .theme-track::before {
    content:''; position:absolute; width:16px; height:16px; border-radius:50%;
    left:2px; top:2px; background:var(--muted); transition:transform .2s, background .2s;
  }
  .theme-switch input:checked + .theme-track { background:#66AAE8; border-color:#66AAE8; }
  .theme-switch input:checked + .theme-track::before { transform:translateX(18px); background:#fff; }

  /* ── Score rings ── */
  .score-block {
    display:flex; justify-content:space-around; align-items:flex-start;
    background:var(--surface); border-radius:14px; padding:14px 8px 12px;
    margin-bottom:12px; border:1px solid var(--border);
    cursor:pointer; transition:filter .15s, border-color .15s;
    position:relative;
  }
  .score-block:hover { filter:brightness(1.06); border-color:#72CE9D; }
  body.light-theme .score-block { background:#ffffff; }
  body.light-theme .score-block:hover { filter:none; background:rgba(114,206,157,.12); border-color:#72CE9D; }
  .score-block.scoring { pointer-events:none; }
  .score-block.scoring::after {
    content:'Scoring…'; position:absolute; inset:0; border-radius:14px;
    background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#72CE9D; letter-spacing:.3px;
  }
  body.light-theme .score-block.scoring::after {
    background:rgba(255,255,255,.75); color:#3a9e72;
  }
  .ring-section { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .score-lbl { font-size:10px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; text-align:center; line-height:1.3; max-width:72px; word-break:break-word; min-height:26px; display:flex; align-items:center; justify-content:center; }
  .score-ring-sm { position:relative; width:72px; height:72px; flex-shrink:0; }
  .score-ring-sm svg { width:72px; height:72px; }
  .score-ring-sm svg { transform:rotate(-90deg); display:block; }
  .ring-inner {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; line-height:1.25;
  }
  .ring-pct { font-size:16px; font-weight:800; color:var(--text); }
  .ring-pct.empty { font-size:11px; color:var(--score-empty); font-weight:600; }
  .ring-count { font-size:9px; color:var(--dim); text-align:center; }

  /* ── Stat cards ── */
  .stats { display:flex; gap:8px; margin-bottom:12px; }
  .stat-card { flex:1; border-radius:10px; padding:9px 12px; border:1px solid var(--border); }
  .stat-card.vocab { background:rgba(102,170,232,.1); }
  .stat-card.kanji { background:rgba(114,206,157,.1); }
  .stat-card .lbl  { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
  .stat-card.vocab .lbl { color:#66AAE8; }
  .stat-card.kanji .lbl { color:#72CE9D; }
  .stat-card .val  { font-size:20px; font-weight:800; color:var(--text); }

  /* ── Misc ── */
  #connect-status { font-size:12px; color:var(--dim); min-height:16px; margin:4px 0 10px; }
  #tok-status     { font-size:11px; color:var(--dim); margin-top:6px; }
  #extra-status   { font-size:11px; color:var(--dim); margin-top:4px; }
  hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" data-tab="main">Main</button>
  <button class="tab-btn" data-tab="vocab">Settings</button>
  <button class="tab-btn" data-tab="advanced">Advanced</button>
</div>

<!-- ── Main ── -->
<div class="tab-panel active" id="tab-main">

  <div class="score-block" id="score-block">
    <div class="ring-section">
      <div class="score-lbl">Unique words</div>
      <div class="score-ring-sm">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle id="unique-ring-bg" cx="36" cy="36" r="30" fill="none" stroke="#363A3B" stroke-width="4"/>
          <circle id="unique-arc" cx="36" cy="36" r="30" fill="none" stroke="#72CE9D"
            stroke-width="4" stroke-linecap="round"
            stroke-dasharray="0 188" style="transition:stroke-dasharray .5s"/>
        </svg>
        <div class="ring-inner">
          <span class="ring-pct empty" id="unique-pct">—</span>
        </div>
      </div>
      <span class="ring-count" id="unique-ct"></span>
    </div>
    <div class="ring-section">
      <div class="score-lbl">Frequency words</div>
      <div class="score-ring-sm">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle id="freq-ring-bg" cx="36" cy="36" r="30" fill="none" stroke="#363A3B" stroke-width="4"/>
          <circle id="freq-arc" cx="36" cy="36" r="30" fill="none" stroke="#66AAE8"
            stroke-width="4" stroke-linecap="round"
            stroke-dasharray="0 188" style="transition:stroke-dasharray .5s"/>
        </svg>
        <div class="ring-inner">
          <span class="ring-pct empty" id="freq-pct">—</span>
        </div>
      </div>
      <span class="ring-count" id="freq-ct"></span>
    </div>
    <div class="ring-section">
      <div class="score-lbl">Kanji</div>
      <div class="score-ring-sm">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle id="kanji-ring-bg" cx="36" cy="36" r="30" fill="none" stroke="#363A3B" stroke-width="4"/>
          <circle id="kanji-arc" cx="36" cy="36" r="30" fill="none" stroke="#FDC281"
            stroke-width="4" stroke-linecap="round"
            stroke-dasharray="0 188" style="transition:stroke-dasharray .5s"/>
        </svg>
        <div class="ring-inner">
          <span class="ring-pct empty" id="kanji-pct">—</span>
        </div>
      </div>
      <span class="ring-count" id="kanji-ct"></span>
    </div>
  </div>
  <div id="status" style="font-size:11px;color:var(--dim);text-align:center;margin:-6px 0 12px">Click to score</div>

  <button class="btn btn-green" id="hover-btn">&#8598; Enable hover on transcript</button>
  <button class="btn btn-purple" id="sidebar-btn">&#9776; Load word sidebar</button>

  <hr>

  <div class="stats">
    <div class="stat-card vocab"><div class="lbl">Vocab</div><div class="val" id="vocab-count">—</div></div>
    <div class="stat-card kanji"><div class="lbl">Kanji</div><div class="val" id="kanji-count">—</div></div>
  </div>
  <div id="tok-status">Tokenizer: not loaded</div>
</div>

<!-- ── Vocab / Settings ── -->
<div class="tab-panel" id="tab-vocab">
  <div class="theme-row">
    <span>Light theme</span>
    <label class="theme-switch">
      <input type="checkbox" id="theme-toggle">
      <span class="theme-track"></span>
    </label>
  </div>
  <div class="theme-row">
    <span>Score-based graph colors</span>
    <label class="theme-switch">
      <input type="checkbox" id="score-colors-toggle">
      <span class="theme-track"></span>
    </label>
  </div>
  <div style="font-size:10px;color:var(--dim);margin:-6px 0 12px;display:flex;gap:10px">
    <span><span style="color:#ED7989">●</span> &lt;50%</span>
    <span><span style="color:#FDC281">●</span> 50–70%</span>
    <span><span style="color:#72CE9D">●</span> 70–95%</span>
    <span><span style="color:#7E69F0">●</span> 95%+</span>
  </div>
  <hr style="margin-top:0">
  <h2>MaruMori vocab</h2>
  <input type="text" id="token" placeholder="Paste your API token…" autocomplete="off" spellcheck="false">
  <button class="btn btn-green" id="connect-btn">Connect &amp; fetch vocab</button>

  <div id="connect-status"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-slate" id="refresh-btn" style="flex:1;margin-bottom:0">↻ Refresh</button>
    <button class="btn btn-pink" id="disconnect-btn" style="flex:1;margin-bottom:0">✕ Disconnect</button>
  </div>
  <hr>
  <button class="btn btn-slate" id="preload-btn">Pre-load tokenizer</button>
</div>

<!-- ── Advanced ── -->
<div class="tab-panel" id="tab-advanced">
  <h2>Advanced</h2>
  <p class="sec-label">Extra known vocab</p>
  <div style="display:flex;gap:8px;margin-bottom:4px">
    <label class="btn btn-amber" style="flex:1;margin-bottom:0">
      Load JSON
      <input type="file" id="extra-file" accept=".json" style="display:none">
    </label>
    <button class="btn btn-pink" id="clear-extra-btn" style="flex:0 0 auto;width:auto;padding:9px 13px;margin-bottom:0">✕ Clear</button>
  </div>
  <div id="extra-status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
