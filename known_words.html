<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Known Words — MaruComprehension</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #1a1c1d; color: #d8dcea;
    min-height: 100vh; padding: 40px 24px;
  }
  .page { max-width: 560px; margin: 0 auto; }

  .header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 800; color: #f2f4fa; }
  .count { font-size: 13px; color: #66748a; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
  input[type="search"] {
    flex: 1; padding: 9px 14px; border-radius: 10px;
    border: 1px solid #363A3B; background: #2D3031;
    color: #f2f4fa; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  input[type="search"]:focus { border-color: #66AAE8; }
  input[type="search"]::placeholder { color: #4a5068; }
  .btn-clear-all {
    padding: 9px 16px; border-radius: 10px; border: 1px solid #ED7989;
    background: none; color: #ED7989; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: background .15s;
    font-family: inherit;
  }
  .btn-clear-all:hover { background: rgba(237,121,137,.1); }
  .btn-clear-all:disabled { opacity: .35; cursor: default; }

  .empty {
    text-align: center; color: #4a5068; font-size: 14px;
    padding: 60px 0; line-height: 1.6;
  }
  .empty strong { display: block; font-size: 18px; color: #66748a; margin-bottom: 8px; }

  .word-list { display: flex; flex-direction: column; gap: 6px; }
  .word-row {
    display: flex; align-items: center; gap: 12px;
    background: #2D3031; border: 1px solid #363A3B;
    border-radius: 10px; padding: 10px 14px;
    transition: border-color .12s;
  }
  .word-row:hover { border-color: #4a5068; }
  .word-text { font-size: 18px; font-weight: 700; color: #f2f4fa; flex: 1; }
  .word-tag { font-size: 10px; font-weight: 700; color: #72CE9D;
    background: rgba(114,206,157,.12); border-radius: 8px;
    padding: 2px 8px; letter-spacing: .3px; }
  .btn-remove {
    background: none; border: 1px solid transparent; color: #4a5068;
    font-size: 16px; line-height: 1; cursor: pointer; padding: 2px 6px;
    border-radius: 6px; transition: color .12s, border-color .12s, background .12s;
    font-family: inherit; flex-shrink: 0;
  }
  .btn-remove:hover { color: #ED7989; border-color: rgba(237,121,137,.4); background: rgba(237,121,137,.07); }

  .no-match { text-align: center; color: #4a5068; font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Known Words</h1>
    <span class="count" id="count-label"></span>
  </div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Filter words…" autocomplete="off">
    <button class="btn-clear-all" id="clear-all-btn">✕ Clear all</button>
  </div>
  <div id="list-container"></div>
</div>
<script src="known_words.js"></script>
</body>
</html>
