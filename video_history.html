<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>History — MaruComprehension</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: #1a1c1d; color: #d8dcea;
  min-height: 100vh; padding: 40px 24px;
}
.page { max-width: 620px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 800; color: #f2f4fa; }
.header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px; }
.subtitle { font-size: 13px; color: #66748a; }

.tab-bar { display: flex; gap: 0; border-bottom: 1px solid #363A3B; margin-bottom: 20px; }
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #6a7480; font-size: 12px; font-weight: 700; letter-spacing: .4px;
  text-transform: uppercase; padding: 8px 16px; cursor: pointer;
  font-family: inherit; margin-bottom: -1px; transition: color .15s, border-color .15s;
}
.tab-btn.active { color: #66AAE8; border-bottom-color: #66AAE8; }

.toolbar { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
input[type="search"] {
  flex: 1; padding: 9px 14px; border-radius: 10px;
  border: 1px solid #363A3B; background: #2D3031;
  color: #f2f4fa; font-size: 13px; outline: none; transition: border-color .15s;
}
input[type="search"]:focus { border-color: #66AAE8; }
input[type="search"]::placeholder { color: #4a5068; }

.btn { padding: 9px 14px; border-radius: 10px; border: 1px solid transparent; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: filter .15s; color: #fff; text-decoration: none; display: inline-flex; align-items: center; }
.btn:disabled { opacity: .35; cursor: default; }
.btn:not(:disabled):hover { filter: brightness(.88); }
.btn-danger { background: #ED7989; border-color: #ED7989; }
.btn-export { background: #66AAE8; border-color: #66AAE8; }
.btn-copy   { background: #72CE9D; border-color: #72CE9D; }
.btn-mm     { background: #FDC281; border-color: #FDC281; }

.sort-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; font-size: 12px; color: #6a7480; }
.sort-btn {
  padding: 4px 12px; border-radius: 8px; border: 1px solid #363A3B;
  background: #2D3031; color: #a0a8b8; font-size: 11px; font-weight: 700;
  letter-spacing: .3px; text-transform: uppercase; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.sort-btn.active { background: rgba(102,170,232,.15); color: #66AAE8; border-color: #66AAE8; }

.video-list { display: flex; flex-direction: column; gap: 8px; }
.video-card {
  display: flex; align-items: center; gap: 12px;
  background: #2D3031; border: 1px solid #363A3B;
  border-radius: 10px; padding: 12px 14px;
  transition: border-color .12s; cursor: pointer;
}
.video-card:hover { border-color: #4a5068; }
.site-badge { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
.site-yt     { background: rgba(237,60,60,.15);   color: #f87070; }
.site-cij    { background: rgba(102,170,232,.15); color: #66AAE8; }
.site-player { background: rgba(126,105,240,.15); color: #9E8CF8; }
.video-info  { flex: 1; min-width: 0; }
.video-title { font-size: 13px; font-weight: 600; color: #f2f4fa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.video-meta  { font-size: 11px; color: #6a7480; }
.score-badge { font-size: 13px; font-weight: 800; flex-shrink: 0; min-width: 40px; text-align: right; }
.watch-count { font-size: 11px; color: #6a7480; flex-shrink: 0; }

.word-list { display: flex; flex-direction: column; gap: 6px; }
.word-row {
  display: flex; align-items: center; gap: 12px;
  background: #2D3031; border: 1px solid #363A3B;
  border-radius: 10px; padding: 10px 14px;
  cursor: default; transition: border-color .12s;
}
.word-row:hover { border-color: #4a5068; }
.word-text  { font-size: 20px; font-weight: 700; color: #f2f4fa; flex: 1; line-height: 2; }
.word-count {
  font-size: 12px; font-weight: 700; color: #66AAE8;
  background: rgba(102,170,232,.12); border-radius: 8px; padding: 2px 10px;
}
.word-date { font-size: 11px; color: #6a7480; flex-shrink: 0; }

.empty { text-align: center; color: #4a5068; font-size: 14px; padding: 60px 0; line-height: 1.6; }
.empty strong { display: block; font-size: 18px; color: #66748a; margin-bottom: 8px; }
.no-match { text-align: center; color: #4a5068; font-size: 13px; padding: 40px 0; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>History</h1>
    <span class="subtitle" id="stats-label"></span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-words-btn">Unknown Words</button>
    <button class="tab-btn" id="tab-videos-btn">Videos</button>
  </div>

  <!-- Unknown Words (default) -->
  <div id="section-words">
    <div class="toolbar">
      <input type="search" id="word-search" placeholder="Filter words…" autocomplete="off">
      <button class="btn btn-copy" id="copy-words-btn">Copy list</button>
      <button class="btn btn-export" id="export-words-btn">↓ CSV</button>
      <a class="btn btn-mm" href="https://marumori.io/tools/imports" target="_blank">MM ↗</a>
      <button class="btn btn-danger" id="clear-words-btn">✕</button>
    </div>
    <div class="sort-row">
      Sort:
      <button class="sort-btn active" id="sort-count-btn">Most seen</button>
      <button class="sort-btn" id="sort-alpha-btn">A → Z</button>
    </div>
    <div id="word-list-container"></div>
  </div>

  <!-- Videos -->
  <div id="section-videos" style="display:none">
    <div class="toolbar">
      <input type="search" id="video-search" placeholder="Filter videos…" autocomplete="off">
      <button class="btn btn-danger" id="clear-videos-btn">✕ Clear</button>
    </div>
    <div id="video-list-container"></div>
  </div>

</div>
<script src="lib/kuromoji.js"></script>
<script src="common.js"></script>
<script src="hover.js"></script>
<script src="video_history.js"></script>
</body>
</html>
